<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYKM — Do You Know Me?</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <div class="logo">DYKM<span class="dot">.</span></div>
    <div class="tagline">How well do your friends really know you?</div>

    <!-- Create form -->
    <div id="create-section" class="section active">
      <div class="card">
        <h2>Create your quiz</h2>
        <p class="subtitle">Add a few facts about yourself — we'll turn them into a roast quiz your friends can play.</p>

        <div class="field">
          <label>Your name</label>
          <input class="input" id="creator-name" type="text" placeholder="e.g. Zagham" maxlength="50" autocomplete="off">
        </div>

        <div class="field">
          <label>Facts about you <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(add at least 5)</span></label>
          <div class="facts-list" id="facts-list"></div>
          <button class="add-fact-btn" id="add-fact-btn" type="button">+ Add another fact</button>
        </div>

        <button class="btn btn-primary" id="create-btn" type="button">Generate my quiz 🔥</button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading-section" class="section">
      <div class="card">
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span id="loading-step-label" style="font-size:14px;font-weight:700;color:var(--text)">Writing your questions…</span>
            <span id="loading-pct" style="font-size:14px;font-weight:700;color:var(--accent)">0%</span>
          </div>
          <div class="progress-bar" style="margin-bottom:0;height:6px">
            <div class="progress-fill" id="loading-bar" style="width:0%;transition:width 0.8s ease"></div>
          </div>
        </div>
        <div id="loading-steps" style="display:flex;flex-direction:column;gap:10px"></div>
      </div>
    </div>

    <!-- Share -->
    <div id="share-section" class="section">
      <div class="card">
        <h2>Your quiz is ready 🎉</h2>
        <p class="subtitle">Copy this link and send it to your friends. See who actually knows you.</p>
        <div class="share-url-box">
          <input class="share-url-input" id="share-url" type="text" readonly>
          <button class="copy-btn" id="copy-btn" type="button">Copy</button>
        </div>
      </div>
      <button class="btn btn-outline" id="restart-btn" type="button">Create another quiz</button>
    </div>
  </div>

  <script>
    const MIN = 5;
    const MAX = 10;
    const HINTS = [
      'e.g. obsessed with pizza',
      'e.g. total night owl',
      'e.g. dog person',
      'e.g. summer is my season',
      'e.g. hiker, not a runner',
      'e.g. terrible at replying',
      'e.g. coffee before anything',
      'e.g. overthinks everything',
      'e.g. always 5 minutes late',
      'e.g. secretly loves reality TV',
    ];

    let factIds = [];

    function uid() { return Date.now() + Math.random(); }

    function show(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function renderFacts() {
      const canRemove = factIds.length > MIN;
      document.getElementById('facts-list').innerHTML = factIds.map((id, i) => `
        <div class="fact-row">
          <input class="input fact-input" type="text" placeholder="${HINTS[i] || 'another fact about you'}" maxlength="120" data-id="${id}" autocomplete="off">
          ${canRemove ? `<button class="remove-fact" data-id="${id}" type="button" aria-label="Remove">×</button>` : ''}
        </div>
      `).join('');

      document.querySelectorAll('.remove-fact').forEach(btn => {
        btn.addEventListener('click', () => {
          factIds = factIds.filter(id => id !== +btn.dataset.id);
          renderFacts();
          updateAddBtn();
        });
      });
    }

    function updateAddBtn() {
      const btn = document.getElementById('add-fact-btn');
      btn.disabled = factIds.length >= MAX;
    }

    function getFactValues() {
      return [...document.querySelectorAll('.fact-input')]
        .map(el => el.value.trim())
        .filter(Boolean);
    }

    function init() {
      for (let i = 0; i < MIN; i++) factIds.push(uid());
      renderFacts();

      document.getElementById('add-fact-btn').addEventListener('click', () => {
        if (factIds.length >= MAX) return;
        factIds.push(uid());
        renderFacts();
        updateAddBtn();
        // focus the new input
        const inputs = document.querySelectorAll('.fact-input');
        inputs[inputs.length - 1].focus();
      });

      document.getElementById('create-btn').addEventListener('click', createQuiz);
      document.getElementById('copy-btn').addEventListener('click', copyLink);
      document.getElementById('restart-btn').addEventListener('click', () => show('create-section'));
    }

    const LOADING_STEPS = [
      { pct: 10, label: 'Writing your questions…',      detail: 'Turning your facts into quiz material' },
      { pct: 35, label: 'Crafting the roasts…',         detail: 'The AI is getting mean (in a loving way)' },
      { pct: 60, label: 'Reviewing the burns…',         detail: 'Making sure each roast hits right' },
      { pct: 80, label: 'Polishing the final questions…', detail: 'Almost there, hang tight' },
      { pct: 92, label: 'Nearly done…',                 detail: 'Wrapping up the last few quips' },
    ];

    let loadingTimer = null;

    function startLoadingAnimation() {
      let stepIndex = 0;
      const bar = document.getElementById('loading-bar');
      const pctEl = document.getElementById('loading-pct');
      const labelEl = document.getElementById('loading-step-label');
      const stepsEl = document.getElementById('loading-steps');

      stepsEl.innerHTML = '';

      function tick() {
        if (stepIndex >= LOADING_STEPS.length) return;
        const step = LOADING_STEPS[stepIndex];

        bar.style.width = step.pct + '%';
        pctEl.textContent = step.pct + '%';
        labelEl.textContent = step.label;

        // Add completed step rows
        if (stepIndex > 0) {
          const prev = LOADING_STEPS[stepIndex - 1];
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-muted)';
          row.innerHTML = `<span style="color:var(--green);font-size:15px">✓</span> ${prev.detail}`;
          stepsEl.appendChild(row);
        }

        // Add current active row
        const active = document.createElement('div');
        active.id = 'active-step';
        active.style.cssText = 'display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text)';
        active.innerHTML = `<span style="display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0"></span> ${step.detail}`;
        stepsEl.appendChild(active);

        stepIndex++;
        loadingTimer = setTimeout(tick, stepIndex === 1 ? 8000 : 12000);
      }

      tick();
    }

    function stopLoadingAnimation() {
      if (loadingTimer) { clearTimeout(loadingTimer); loadingTimer = null; }
      const bar = document.getElementById('loading-bar');
      const pctEl = document.getElementById('loading-pct');
      const labelEl = document.getElementById('loading-step-label');
      if (bar) { bar.style.width = '100%'; }
      if (pctEl) { pctEl.textContent = '100%'; }
      if (labelEl) { labelEl.textContent = 'Done!'; }
    }

    async function createQuiz() {
      const name = document.getElementById('creator-name').value.trim();
      const answers = getFactValues();

      if (!name) {
        document.getElementById('creator-name').focus();
        return;
      }
      if (answers.length < MIN) {
        alert(`Please fill in at least ${MIN} facts about yourself.`);
        return;
      }

      show('loading-section');
      startLoadingAnimation();

      try {
        const res = await fetch('/quizzes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ creator_name: name, answers }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }
        const data = await res.json();
        stopLoadingAnimation();
        const url = `${location.origin}/q/${data.id}`;
        document.getElementById('share-url').value = url;
        show('share-section');
      } catch (err) {
        stopLoadingAnimation();
        alert('Something went wrong: ' + err.message);
        show('create-section');
      }
    }

    function copyLink() {
      const url = document.getElementById('share-url').value;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    init();
  </script>
</body>
</html>
